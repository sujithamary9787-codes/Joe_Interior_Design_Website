<!-- POPUP FORM -->
<div id="popup" class="popup">

    <div class="popup-content">
        <span class="close" onclick="closeForm()">×</span>

        <form action="/submit" method="POST">

            <h2 class="quote-title">GET QUOTED</h2>

            <input type="text" name="name" placeholder="Name" required>
            <input type="text" name="phone" placeholder="Phone No" required>

            <label>Location</label>
            <div class="radio-group">
                <input type="radio" name="location" value="Trichy"> Trichy
                <input type="radio" name="location" value="Chennai"> Chennai
            </div>

            <textarea name="details" placeholder="Project Details"></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>

</div>


<!-- SCRIPT -->
<script>
function openForm() {
    document.getElementById("popup").style.display = "flex";
}

function closeForm() {
    document.getElementById("popup").style.display = "none";
}
</script>
